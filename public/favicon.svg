<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2C333D"/>
      <stop offset="100%" style="stop-color:#1A2028"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C8D9E8"/>
      <stop offset="100%" style="stop-color:#A8C4D8"/>
    </linearGradient>
  </defs>
  
  <!-- Background square with slight rounding -->
  <rect width="100" height="100" rx="14" fill="url(#bg)"/>
  
  <!-- T — horizontal bar -->
  <rect x="18" y="18" width="64" height="11" rx="2" fill="url(#accent)"/>
  
  <!-- T — vertical stem (left-center) -->
  <rect x="36" y="18" width="11" height="52" rx="2" fill="url(#accent)"/>
  
  <!-- C — arc shape using path -->
  <!-- C sits to the right, using the T stem as its vertical anchor -->
  <path d="
    M 82 38
    A 26 26 0 1 0 82 72
    L 82 62
    A 16 16 0 1 1 82 48
    Z
  " fill="url(#accent)"/>
  
</svg>
